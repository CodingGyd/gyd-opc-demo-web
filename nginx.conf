server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS，每 10s 重新解析上游主机名
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to gateway (unified entry) — inject productKey at proxy layer
    location /api/ {
        set $gateway_upstream http://gateway:8000;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_set_header X-Product-Key demo-web;
        proxy_set_header Authorization $http_authorization;
    }

    # Static assets cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
